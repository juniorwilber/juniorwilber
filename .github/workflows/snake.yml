name: Generar snake de contribuciones

on:
  # Se regenera cada 12 horas para mantenerla al día
  schedule:
    - cron: "0 */12 * * *"
  # Permite ejecutarla manualmente desde la pestaña Actions
  workflow_dispatch:
  # Y también al hacer push a main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generar el SVG de la serpiente
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publicar el resultado en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
